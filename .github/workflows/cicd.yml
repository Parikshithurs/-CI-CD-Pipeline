name: CI/CD Pipeline

# Triggers: runs on every push to main, or on any Pull Request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Test ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest             # fresh Linux machine every time

    steps:
      - name: Checkout code             # pull your repo code into the machine
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        run: pytest tests/ -v           # -v gives detailed output in logs

  # ── JOB 2: Deploy ──────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test                         # ⚠️ ONLY runs if test job passes

    # Only deploy on pushes to main (not on pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy triggered on Render!"